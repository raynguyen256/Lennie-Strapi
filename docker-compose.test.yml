services:
  backend:
    container_name: backend2
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 1337
      CORS_ORIGINS: http://localhost:3001,http://frontend:3000
      SEED_ASSETS_DIR: /app/seed-assets
    ports:
      - "1338:1337"
    volumes:
      - strapi_data_test:/app/.tmp
      - strapi_uploads_test:/app/public/uploads
      - ./frontend/public/assets:/app/seed-assets:ro
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:1337/admin').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  frontend:
    container_name: frontend2
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_STRAPI_URL: ${NEXT_PUBLIC_STRAPI_URL:-http://localhost:1338}
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_STRAPI_URL: ${NEXT_PUBLIC_STRAPI_URL:-http://localhost:1338}
      STRAPI_INTERNAL_URL: ${STRAPI_INTERNAL_URL:-http://backend:1337}
      STRAPI_API_TOKEN: ${STRAPI_API_TOKEN}
    ports:
      - "3001:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  strapi_data_test:
  strapi_uploads_test:
