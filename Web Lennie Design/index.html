<script>
/* Rewrites runtime <img src="assets/..."> (set by React) to inlined blob URLs.
   No-op in dev (window.__resources undefined), active in the bundled standalone file. */
(function () {
  function resolve(s) {
    if (!window.__resources || !s) return null;
    if (window.__resources[s]) return window.__resources[s];
    var i = s.indexOf('assets/');
    if (i > 0) { var k = s.slice(i); if (window.__resources[k]) return window.__resources[k]; }
    return null;
  }
  function sweep(root) {
    if (!window.__resources || !root || !root.querySelectorAll) return;
    root.querySelectorAll('img[src]').forEach(function (img) {
      var r = resolve(img.getAttribute('src'));
      if (r && img.src !== r) img.src = r;
    });
    root.querySelectorAll('[style*="assets/"]').forEach(function (el) {
      var st = el.getAttribute('style');
      var m = st && st.match(/url\(["']?([^"')]*assets\/[^"')]+)["']?\)/);
      if (m) { var r = resolve(m[1]); if (r) el.style.backgroundImage = 'url("' + r + '")'; }
    });
  }
  function start() {
    sweep(document.body);
    var mo = new MutationObserver(function (muts) {
      for (var i = 0; i < muts.length; i++) {
        var m = muts[i];
        if (m.type === 'attributes' && m.target.tagName === 'IMG') {
          var r = resolve(m.target.getAttribute('src'));
          if (r && m.target.src !== r) m.target.src = r;
        }
        for (var j = 0; j < m.addedNodes.length; j++) {
          var n = m.addedNodes[j];
          if (n.nodeType === 1) {
            if (n.tagName === 'IMG') { var rr = resolve(n.getAttribute('src')); if (rr) n.src = rr; }
            sweep(n);
          }
        }
      }
    });
    mo.observe(document.documentElement, { childList: true, subtree: true, attributes: true, attributeFilter: ['src', 'style'] });
    [120, 400, 900, 1800, 3000].forEach(function (t) { setTimeout(function () { sweep(document.body); }, t); });
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', start);
  else start();
})();
</script>
